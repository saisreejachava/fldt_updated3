<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Blog Admin - Florida Digital Twin</title>
  <style>
    /* Password gate */
    #cms-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #cms-gate.hidden { display: none !important; }
    #cms-app { display: none; }
    #cms-app.loaded { display: block; }
    .cms-gate__box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .cms-gate__title {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
    }
    .cms-gate__hint {
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      margin: 0 0 1.5rem 0;
    }
    .cms-gate__input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    .cms-gate__input::placeholder { color: rgba(255,255,255,0.4); }
    .cms-gate__error {
      color: #f87171;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      min-height: 1.25rem;
    }
    .cms-gate__btn {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    .cms-gate__btn:hover { background: #2563eb; }
    /* Decap CMS branding (after gate) */
    [class*="AppHeader"] { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important; }
    [class*="ControlPaneContainer"] { max-width: 900px; }
  </style>
</head>
<body>
  <div id="cms-gate">
    <div class="cms-gate__box">
      <h1 class="cms-gate__title">Blog Admin</h1>
      <p class="cms-gate__hint">Enter the admin password to continue.</p>
      <div class="cms-gate__error" id="cms-gate-error" role="alert"></div>
      <input type="password" class="cms-gate__input" id="cms-gate-password" placeholder="Password" autocomplete="current-password" />
      <button type="button" class="cms-gate__btn" id="cms-gate-submit">Continue</button>
    </div>
  </div>
  <div id="cms-app"></div>
  <!-- Decap CMS script - loaded dynamically after password gate to ensure proper initialization -->
  <script>
    (function() {
      // Password hash (SHA-256 of your password). Change this for production.
      // Generate a new hash at: https://emn178.github.io/online-tools/sha256.html
      // Default hash below is for password: "check"
      var EXPECTED_HASH = '20f65c28671b40937c5bf23acc7c6f37e5a5ec0622e347b57685725df5ba9e50';
      var SESSION_KEY = 'cms_authenticated';
      var SESSION_TTL = 8 * 60 * 60 * 1000; // 8 hours

      // SHA-256 implementation that works over HTTP (not requiring HTTPS)
      function sha256(s) {
        var chrsz = 8;
        var hexcase = 0;
        function safe_add(x, y) {
          var lsw = (x & 0xFFFF) + (y & 0xFFFF);
          var msw = (x >> 16) + (y >> 16) + (lsw >> 16);
          return (msw << 16) | (lsw & 0xFFFF);
        }
        function S(X, n) { return (X >>> n) | (X << (32 - n)); }
        function R(X, n) { return (X >>> n); }
        function Ch(x, y, z) { return ((x & y) ^ ((~x) & z)); }
        function Maj(x, y, z) { return ((x & y) ^ (x & z) ^ (y & z)); }
        function Sigma0256(x) { return (S(x, 2) ^ S(x, 13) ^ S(x, 22)); }
        function Sigma1256(x) { return (S(x, 6) ^ S(x, 11) ^ S(x, 25)); }
        function Gamma0256(x) { return (S(x, 7) ^ S(x, 18) ^ R(x, 3)); }
        function Gamma1256(x) { return (S(x, 17) ^ S(x, 19) ^ R(x, 10)); }
        function core_sha256(m, l) {
          var K = [0x428A2F98,0x71374491,0xB5C0FBCF,0xE9B5DBA5,0x3956C25B,0x59F111F1,0x923F82A4,0xAB1C5ED5,0xD807AA98,0x12835B01,0x243185BE,0x550C7DC3,0x72BE5D74,0x80DEB1FE,0x9BDC06A7,0xC19BF174,0xE49B69C1,0xEFBE4786,0x0FC19DC6,0x240CA1CC,0x2DE92C6F,0x4A7484AA,0x5CB0A9DC,0x76F988DA,0x983E5152,0xA831C66D,0xB00327C8,0xBF597FC7,0xC6E00BF3,0xD5A79147,0x06CA6351,0x14292967,0x27B70A85,0x2E1B2138,0x4D2C6DFC,0x53380D13,0x650A7354,0x766A0ABB,0x81C2C92E,0x92722C85,0xA2BFE8A1,0xA81A664B,0xC24B8B70,0xC76C51A3,0xD192E819,0xD6990624,0xF40E3585,0x106AA070,0x19A4C116,0x1E376C08,0x2748774C,0x34B0BCB5,0x391C0CB3,0x4ED8AA4A,0x5B9CCA4F,0x682E6FF3,0x748F82EE,0x78A5636F,0x84C87814,0x8CC70208,0x90BEFFFA,0xA4506CEB,0xBEF9A3F7,0xC67178F2];
          var HASH = [0x6A09E667,0xBB67AE85,0x3C6EF372,0xA54FF53A,0x510E527F,0x9B05688C,0x1F83D9AB,0x5BE0CD19];
          var W = new Array(64);
          var a, b, c, d, e, f, g, h, i, j;
          var T1, T2;
          m[l >> 5] |= 0x80 << (24 - l % 32);
          m[((l + 64 >> 9) << 4) + 15] = l;
          for (var i = 0; i < m.length; i += 16) {
            a = HASH[0]; b = HASH[1]; c = HASH[2]; d = HASH[3];
            e = HASH[4]; f = HASH[5]; g = HASH[6]; h = HASH[7];
            for (var j = 0; j < 64; j++) {
              if (j < 16) W[j] = m[j + i];
              else W[j] = safe_add(safe_add(safe_add(Gamma1256(W[j - 2]), W[j - 7]), Gamma0256(W[j - 15])), W[j - 16]);
              T1 = safe_add(safe_add(safe_add(safe_add(h, Sigma1256(e)), Ch(e, f, g)), K[j]), W[j]);
              T2 = safe_add(Sigma0256(a), Maj(a, b, c));
              h = g; g = f; f = e; e = safe_add(d, T1);
              d = c; c = b; b = a; a = safe_add(T1, T2);
            }
            HASH[0] = safe_add(a, HASH[0]); HASH[1] = safe_add(b, HASH[1]);
            HASH[2] = safe_add(c, HASH[2]); HASH[3] = safe_add(d, HASH[3]);
            HASH[4] = safe_add(e, HASH[4]); HASH[5] = safe_add(f, HASH[5]);
            HASH[6] = safe_add(g, HASH[6]); HASH[7] = safe_add(h, HASH[7]);
          }
          return HASH;
        }
        function str2binb(str) {
          var bin = Array();
          var mask = (1 << chrsz) - 1;
          for (var i = 0; i < str.length * chrsz; i += chrsz)
            bin[i >> 5] |= (str.charCodeAt(i / chrsz) & mask) << (24 - i % 32);
          return bin;
        }
        function Utf8Encode(string) {
          string = string.replace(/\r\n/g,"\n");
          var utftext = "";
          for (var n = 0; n < string.length; n++) {
            var c = string.charCodeAt(n);
            if (c < 128) {
              utftext += String.fromCharCode(c);
            } else if((c > 127) && (c < 2048)) {
              utftext += String.fromCharCode((c >> 6) | 192);
              utftext += String.fromCharCode((c & 63) | 128);
            } else {
              utftext += String.fromCharCode((c >> 12) | 224);
              utftext += String.fromCharCode(((c >> 6) & 63) | 128);
              utftext += String.fromCharCode((c & 63) | 128);
            }
          }
          return utftext;
        }
        function binb2hex(binarray) {
          var hex_tab = hexcase ? "0123456789ABCDEF" : "0123456789abcdef";
          var str = "";
          for (var i = 0; i < binarray.length * 4; i++) {
            str += hex_tab.charAt((binarray[i >> 2] >> ((3 - i % 4) * 8 + 4)) & 0xF) +
                   hex_tab.charAt((binarray[i >> 2] >> ((3 - i % 4) * 8)) & 0xF);
          }
          return str;
        }
        return binb2hex(core_sha256(str2binb(Utf8Encode(s)), s.length * chrsz));
      }
      function hash(s) {
        return Promise.resolve(sha256(s));
      }

      function checkSession() {
        try {
          var raw = sessionStorage.getItem(SESSION_KEY);
          if (!raw) return false;
          var data = JSON.parse(raw);
          return data.expires > Date.now();
        } catch (e) { return false; }
      }

      function setSession() {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ expires: Date.now() + SESSION_TTL }));
      }

      function showApp() {
        console.debug('[CMS gate] showApp – loading Decap CMS');
        document.getElementById('cms-gate').classList.add('hidden');
        document.getElementById('cms-app').classList.add('loaded');
        loadCMS();
      }

      function loadCMS() {
        console.debug('[CMS gate] loadCMS – loading Decap CMS');
        // Load Decap CMS script dynamically after password gate
        // Decap CMS v3 will auto-detect config.yml from /cms/config.yml
        var script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        script.onload = function() {
          console.debug('[CMS gate] decap-cms.js loaded');
          // Give Decap CMS a moment to initialize and load config.yml
          setTimeout(function() {
            if (typeof CMS !== 'undefined') {
              console.debug('[CMS gate] CMS object available');
              if (CMS.registerPreviewStyle) {
                CMS.registerPreviewStyle('/cms/preview.css');
              }
              console.debug('[CMS gate] CMS initialized - config.yml should auto-load from /cms/config.yml');
            } else {
              console.error('[CMS gate] CMS object not available');
              document.getElementById('cms-app').innerHTML = 
                '<div style="padding: 20px; color: red;">' +
                '<h2>Error initializing CMS</h2>' +
                '<p>Decap CMS failed to initialize. Please check the browser console for details.</p>' +
                '<p>Make sure /cms/config.yml is accessible at <a href="/cms/config.yml" target="_blank">/cms/config.yml</a></p>' +
                '</div>';
            }
          }, 1000);
        };
        script.onerror = function() { 
          console.error('[CMS gate] failed to load decap-cms.js');
          document.getElementById('cms-app').innerHTML = 
            '<div style="padding: 20px; color: red;">' +
            '<h2>Error loading CMS</h2>' +
            '<p>Failed to load Decap CMS script. Please check your network connection.</p>' +
            '</div>';
        };
        document.getElementById('cms-app').appendChild(script);
      }

      function runGate() {
        console.debug('[CMS gate] runGate');
        if (checkSession()) {
          console.debug('[CMS gate] valid session, showing app');
          showApp();
          return;
        }
        var el = document.getElementById('cms-gate');
        var pwd = document.getElementById('cms-gate-password');
        var err = document.getElementById('cms-gate-error');
        var btn = document.getElementById('cms-gate-submit');
        el.classList.remove('hidden');
        btn.addEventListener('click', function() {
          var v = (pwd.value || '').trim();
          err.textContent = '';
          if (!v) {
            err.textContent = 'Enter a password.';
            return;
          }
          console.debug('[CMS gate] checking password…');
          btn.disabled = true;
          hash(v).then(function(h) {
            console.debug('[CMS gate] hash result (first 16 chars):', h ? h.slice(0, 16) + '…' : 'empty');
            if (h.toLowerCase() === EXPECTED_HASH.toLowerCase()) {
              setSession();
              showApp();
            } else {
              err.textContent = 'Incorrect password.';
              btn.disabled = false;
            }
          }).catch(function(e) {
            console.error('[CMS gate] hash error:', e);
            err.textContent = 'Error checking password.';
            btn.disabled = false;
          });
        });
        pwd.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') btn.click();
        });
      }
      runGate();
    })();
  </script>
</body>
</html>
